default:
  app_name: "AI Chatbot RAG"
  brand_name: "Assistant"
  brand_mark: "halo-badge.svg"
  font_stylesheet_url: "https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
  badge_label: "Document Support"
  hero_title: "Answers from your documents"
  hero_lede: "Ask a question and get a sourced answer grounded in the uploaded knowledge base."
  input_placeholder: "Ask a question..."
  submit_label: "Ask"
  answer_label: "Answer"
  sources_label: "Sources"
  new_chat_label: "✨ New chat"
  footer_note: "Prototype AI chatbot for a document support experience."
  suggested_questions:
    - "💬 What can I ask about?"
    - "📎 Which sources support the answer?"
    - "🧭 Summarize the key points."
    - "📄 Which document should I read first?"
  theme:
    bg: "#fbfbfd"
    surface: "#ffffff"
    ink: "#0d1b2a"
    ink-soft: "#5e6b7a"
    line: "#e9ebf0"
    brand: "#9246fc"
    brand-tint: "#e9ecff"
    brand-contrast: "#ffffff"
    font-body: "ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-display: "'Space Grotesk', ui-sans-serif, system-ui, sans-serif"
    brand-mark-size: "34px"
    action-shadow: "0 6px 20px rgba(146,70,252,0.28)"
    action-shadow-hover: "0 10px 28px rgba(146,70,252,0.36)"
    glow-1: "#c2d8ff"
    glow-2: "#ffddb8"
    glow-3: "#e2ccff"
    glow-4: "#bbedff"
    glow-bg: "#f9f9fd"
    background-effect: "radial-gradient(45% 55% at 18% 28%, var(--glow-1) 0%, transparent 65%), radial-gradient(38% 48% at 76% 22%, var(--glow-2) 0%, transparent 65%), radial-gradient(50% 55% at 62% 72%, var(--glow-3) 0%, transparent 65%), radial-gradient(42% 50% at 28% 82%, var(--glow-4) 0%, transparent 65%)"
    background-effect-filter: "blur(80px) saturate(110%)"
    background-effect-opacity: "0.80"

halo:
  app_name: "Halo Support"
  brand_name: "HALO"
  assistant_names:
    - "Halo"
  badge_label: "Banking Support"
  hero_title: "Answers, not guesswork"
  hero_lede: "Ask anything about your account. Every answer is grounded in real documents, with its sources shown."
  input_placeholder: "Ask about your account..."
  footer_note: "Prototype AI chatbot for a fintech customer support experience."
  suggested_questions:
    - "💳 What should I do if my card is lost?"
    - "💷 What account plans and fees are available?"
    - "🛡️ How are my deposits protected?"
    - "✈️ What fees apply when I travel?"
  theme:
    brand-mark-size: "42px"

legal:
  app_name: "Legal Assistant"
  brand_name: "LEXA"
  font_stylesheet_url: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@700&display=swap"
  assistant_names:
    - "Legal"
    - "Legal Assistant"
  badge_label: "Legal Knowledge Base"
  hero_title: "Clear answers from case files"
  hero_lede: "Ask about policies, clauses, or uploaded matter documents and review the sources behind each response."
  input_placeholder: "Ask about a clause, policy, or matter..."
  suggested_questions:
    - "📑 What clauses should I review first?"
    - "✅ What obligations are mentioned in the agreement?"
    - "📎 Which sources support this answer?"
    - "⚠️ What risks should I check?"
  theme:
    brand: "#256f75"
    brand-tint: "#dff5f3"
    font-body: "Inter, ui-sans-serif, system-ui, sans-serif"
    font-display: "'Libre Baskerville', Georgia, serif"
    action-shadow: "0 6px 20px rgba(37,111,117,0.25)"
    action-shadow-hover: "0 10px 28px rgba(37,111,117,0.34)"
    glow-1: "#d8efe8"
    glow-2: "#eef0cb"
    glow-3: "#cfe5f2"
    glow-4: "#f6dde3"

ecommerce:
  app_name: "Commerce Assistant"
  brand_name: "SHOP"
  font_stylesheet_url: "https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
  assistant_names:
    - "Commerce"
    - "Ecommerce"
    - "E-commerce"
    - "E-commerce Assistant"
  badge_label: "Product Support"
  hero_title: "Product answers that convert"
  hero_lede: "Ask about catalog details, returns, shipping, sizing, or policies and get sourced answers from your store knowledge base."
  input_placeholder: "Ask about a product or order policy..."
  suggested_questions:
    - "↩️ What is the returns policy?"
    - "🎯 Which products fit this use case?"
    - "🚚 What shipping details should customers know?"
    - "📦 What should I know before ordering?"
  theme:
    brand: "#c14f2b"
    brand-tint: "#ffe8dd"
    font-body: "Manrope, ui-sans-serif, system-ui, sans-serif"
    font-display: "Manrope, ui-sans-serif, system-ui, sans-serif"
    action-shadow: "0 6px 20px rgba(193,79,43,0.25)"
    action-shadow-hover: "0 10px 28px rgba(193,79,43,0.34)"
    glow-1: "#ffe1c2"
    glow-2: "#d7edda"
    glow-3: "#f5d6ef"
    glow-4: "#c8e6ff"
