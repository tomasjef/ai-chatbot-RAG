<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Halo">
  <defs>
    <linearGradient id="halo-wash" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#2c44ff"/>
      <stop offset="0.4" stop-color="#6f7bff"/>
      <stop offset="0.7" stop-color="#b98cff"/>
      <stop offset="1"   stop-color="#ffc97a"/>
    </linearGradient>
    <filter id="halo-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#halo-wash)" stroke-width="9"
          stroke-linecap="round" filter="url(#halo-glow)" opacity="0.55">
    <animate attributeName="opacity"
             values="0.4; 0.75; 0.4" dur="4s"
             repeatCount="indefinite" calcMode="spline"
             keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#halo-wash)" stroke-width="6.5"
          stroke-linecap="round"/>
</svg>
